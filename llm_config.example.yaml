# LLM Configuration
# This file defines available models, providers, and task assignments

# Model Providers Configuration
providers:
  openai:
    name: 'OpenAI'
    api_key_env: 'OPENAI_API_KEY'
    base_url: 'https://api.openai.com/v1'
    requires_api_key: true
    openai_compatible: true

  xai:
    name: 'xAI'
    api_key_env: 'XAI_API_KEY'
    base_url: 'https://api.x.ai/v1'
    requires_api_key: true
    openai_compatible: false

  gemini:
    name: 'Google Gemini'
    api_key_env: 'GOOGLE_API_KEY'
    requires_api_key: true
    openai_compatible: false

  claude:
    name: 'Anthropic Claude'
    api_key_env: 'ANTHROPIC_API_KEY'
    requires_api_key: true
    openai_compatible: false

  ollama:
    name: 'Ollama Local'
    base_url: 'http://localhost:11434'
    requires_api_key: false
    openai_compatible: false

  custom_openai_compatible:
    name: 'Custom OpenAI Compatible'
    api_key_env: 'CUSTOM_LLM_API_KEY'
    base_url: 'https://api.custom-llm.com/v1'
    requires_api_key: true
    openai_compatible: true

  deepinfra:
    name: 'DeepInfra'
    api_key_env: 'DEEPINFRA_API_TOKEN'
    requires_api_key: true
    openai_compatible: false

  fireworks:
    name: 'Fireworks AI'
    api_key_env: 'FIREWORKS_API_KEY'
    requires_api_key: true
    openai_compatible: false

# Available Models Configuration
models:
  # OpenAI Models
  gpt-5:
    provider: 'openai'
    display_name: 'GPT-5'
    description: 'Most capable model for complex tasks'
    max_tokens: 8192
    temperature: 0.7
    # Multimodal (vision) capable. Drives capability-aware tool routing.
    multimodal: true
    # Reasoning output configuration (optional)
    # Provider-specific kwargs passed to LangChain model constructor when
    # reasoning_output is enabled on an agent. Each provider uses its own format.
    # OpenAI models use the 'reasoning' kwarg.
    reasoning_config:
      reasoning:
        effort: "low"
        summary: "auto"
    # Pricing (sourced from OpenAI pricing page)
    # Source: https://platform.openai.com/docs/pricing (values shown are per 1M tokens)
    # Pricing is per 1M tokens (cost_per_1m).
    pricing:
      currency: USD
      input:
        cost_per_1m: 1.25 # $1.25 per 1M tokens 
      output:
        cost_per_1m: 10 # $10.00 per 1M tokens 
      extras:
        cache_read_tokens:
          cost_per_1m: 0.125 # cached input $0.125 per 1M 
      key_aliases:
        prompt_tokens: input_tokens
        completion_tokens: output_tokens
        cached_input: cache_read_tokens
      rounding:
        decimals: 6

  gpt-5-mini:
    provider: 'openai'
    display_name: 'GPT-5 Mini'
    description: 'Affordable and intelligent small model'
    max_tokens: 8192
    temperature: 0.7
    multimodal: true
    reasoning_config:
      reasoning:
        effort: "high"
        summary: "auto"
    # Pricing (sourced from OpenAI pricing page)
    # Pricing is per 1M tokens (cost_per_1m).
    pricing:
      currency: USD
      input:
        cost_per_1m: 0.25 # $0.25 per 1M 
      output:
        cost_per_1m: 2 # $2.00 per 1M 
      extras:
        cache_read_tokens:
          cost_per_1m: 0.025 # cached input $0.025 per 1M 
      key_aliases:
        prompt_tokens: input_tokens
        completion_tokens: output_tokens
        cached_input: cache_read_tokens
      rounding:
        decimals: 6

  gpt-5-nano:
    provider: 'openai'
    display_name: 'GPT-5 Nano'
    description: 'Fast and efficient for most tasks'
    max_tokens: 4096
    temperature: 0.7
    multimodal: true
    # Example of extra/nested parameters supported by the core:
    # These must also be added to 'allowed' in param_policies for the provider
    logit_bias:
      '50256': -100
    response_format:
      type: 'json_object'
    # Pricing (sourced from OpenAI pricing page)
    pricing:
      currency: USD
      input:
        cost_per_1m: 0.05 # $0.05 per 1M 
      output:
        cost_per_1m: 0.4 # $0.40 per 1M 
      extras:
        cache_read_tokens:
          cost_per_1m: 0.005 # cached input $0.005 per 1M 
      key_aliases:
        prompt_tokens: input_tokens
        completion_tokens: output_tokens
        cached_input: cache_read_tokens
      rounding:
        decimals: 6

  gpt-4.1:
    provider: 'openai'
    display_name: 'GPT-4.1'
    description: 'Legacy model with advanced capabilities'
    max_tokens: 8192
    temperature: 0.7
    multimodal: true
    # Pricing (sourced from OpenAI pricing page)
    pricing:
      currency: USD
      input:
        cost_per_1m: 2 # $2.00 per 1M 
      output:
        cost_per_1m: 8 # $8.00 per 1M 
      extras:
        cache_read_tokens:
          cost_per_1m: 0.5 # cached input $0.50 per 1M 
      key_aliases:
        prompt_tokens: input_tokens
        completion_tokens: output_tokens
        cached_input: cache_read_tokens
      rounding:
        decimals: 6

  # xAI Grok Models
  grok-4.3-latest:
    provider: 'xai'
    display_name: 'Grok 4'
    description: 'Latest Grok model for complex chat and tool-using tasks'
    max_tokens: 8192
    temperature: 0.7
    pricing:
      currency: USD
      input:
        cost_per_1m: 1.25 # $1.25 per 1M tokens
      output:
        cost_per_1m: 2.5 # $2.50 per 1M tokens
    reasoning_config:
      reasoning_effort: 'high'

  # Gemini Models
  gemini-2.5-flash: # Fast multimodal
    provider: 'gemini'
    display_name: 'Gemini 2.0 Flash'
    description: 'Fast Gemini model for general tasks'
    max_tokens: 8192
    temperature: 0.7
    multimodal: true
    # Gemini models use thinking_level + include_thoughts for reasoning.
    reasoning_config:
      thinking_level: "low"
      include_thoughts: true
    # Pricing (sourced from Google Gemini pricing page)
    # Source: https://ai.google.dev/gemini-api/docs/pricing (captured 2025-09-27)
    # Values are per 1M tokens (cost_per_1m).
    pricing:
      currency: USD
      input:
        cost_per_1m: 0.3 # $0.30 per 1M tokens  (text/image/video)
      output:
        cost_per_1m: 2.5 # $2.50 per 1M tokens 
      extras:
        cache_read_tokens:
          cost_per_1m: 0.075 # context caching $0.075 per 1M 
      key_aliases:
        prompt_tokens: input_tokens
        completion_tokens: output_tokens
        cached_input: cache_read_tokens
      rounding:
        decimals: 6

  gemini-2.5-pro: # Higher quality reasoning
    provider: 'gemini'
    display_name: 'Gemini 2.0 Pro'
    description: 'High quality Gemini model for complex reasoning'
    max_tokens: 8192
    temperature: 0.6
    multimodal: true
    # Pricing (sourced from Google Gemini pricing page)
    # Source: https://ai.google.dev/gemini-api/docs/pricing (captured 2025-09-27)
    # Values are per 1M tokens (cost_per_1m).
    pricing:
      currency: USD
      input:
        cost_per_1m: 1.25 # $1.25 per 1M tokens 
      output:
        cost_per_1m: 10 # $10.00 per 1M tokens 
      extras:
        cache_read_tokens:
          cost_per_1m: 0.31 # context caching $0.31 per 1M  (see page for tiered values)
      # Gemini 2.5 Pro uses tiered pricing depending on prompt/context size (notably around 200k tokens).
      # The public pricing page lists different paid-tier prices for prompts <= 200k tokens vs other sizes.
      # We model this using `context_tiers`. Adjust multipliers as needed to match exact per-dimension rules.
      context_tiers:
        - max_context: 200000
          multiplier: 1.0 # baseline tier (<= 200k). The source shows special per-dimension prices for small prompts.
        - max_context: 1000000
          multiplier: 2 # larger-context multiplier (applies up to 1M tokens)
      key_aliases:
        prompt_tokens: input_tokens
        completion_tokens: output_tokens
        cached_input: cache_read_tokens
      rounding:
        decimals: 6

  # Claude Models
  claude-opus-4-1-20250805:
    provider: 'claude'
    display_name: 'Claude Opus 4.1'
    description: 'Latest Claude model with the most advanced capabilities'
    max_tokens: 8192
    temperature: 0.7
    multimodal: true
    # Pricing (sourced from Claude pricing page)
    # Source: https://claude.com/pricing#api (captured live)
    # Values shown on the page are per MTok (1,000,000 tokens) — use cost_per_1m directly.
    pricing:
      currency: USD
      input:
        cost_per_1m: 15 # $15 / MTok 
      output:
        cost_per_1m: 75 # $75 / MTok 
      extras:
        cache_write_tokens:
          cost_per_1m: 18.75 # $18.75 / MTok 
          billed_separately: true
        cache_read_tokens:
          cost_per_1m: 1.5 # $1.50 / MTok 
      key_aliases:
        prompt_tokens: input_tokens
        completion_tokens: output_tokens
        cache_write: cache_write_tokens
        cache_read: cache_read_tokens
      rounding:
        decimals: 6

  claude-sonnet-4-20250514:
    provider: 'claude'
    display_name: 'Claude Sonnet 4'
    description: 'Claude Sonnet 4 model for high performance'
    max_tokens: 8192
    temperature: 0.7
    multimodal: true
    # Claude models use the 'thinking' kwarg for extended thinking.
    # When thinking is enabled, the runtime removes `temperature` so Claude can
    # use its default value, and increases `max_tokens` if it would otherwise be
    # less than or equal to the thinking budget.
    reasoning_config:
      thinking:
        type: "enabled"
        budget_tokens: 5000
    # Pricing (sourced from Claude pricing page)
    # Sonnet 4 uses tiered pricing depending on prompt size (<=200K tokens vs >200K tokens)
    # Values are per MTok (cost_per_1m).
    pricing:
      currency: USD
      # base prices correspond to the <=200K prompt tier
      input:
        cost_per_1m: 3 # $3 / MTok  (prompts <= 200k)
      output:
        cost_per_1m: 15 # $15 / MTok  (prompts <= 200k)
      extras:
        cache_write_tokens:
          cost_per_1m: 3.75 # $3.75 / MTok  (<=200k)
          billed_separately: true
        cache_read_tokens:
          cost_per_1m: 0.3 # $0.30 / MTok  (<=200k)
      # context_tiers allow per-context multipliers; Sonnet's >200K tier uses different multipliers per-dimension
      context_tiers:
        - max_context: 200000
          multipliers:
            input: 1.0
            output: 1.0
            extras:
              cache_write_tokens: 1.0
              cache_read_tokens: 1.0
        - max_context: 1000000
          multipliers:
            input: 2.0 # input doubles: $6 / MTok -> multiplier 2.0
            output: 1.5 # output increases by 1.5x: $22.50 / MTok
            extras:
              cache_write_tokens: 2.0
              cache_read_tokens: 2.0
      key_aliases:
        prompt_tokens: input_tokens
        completion_tokens: output_tokens
        cache_write: cache_write_tokens
        cache_read: cache_read_tokens
      rounding:
        decimals: 6

  claude-3-7-sonnet-latest:
    provider: 'claude'
    display_name: 'Claude 3.7 Sonnet'
    description: 'Balanced performance Claude model'
    max_tokens: 8192
    temperature: 0.7
    multimodal: true
    # Pricing (sourced from Claude pricing page - legacy models section)
    # Values are per MTok; converted to per-1k.
    pricing:
      currency: USD
      input:
        cost_per_1m: 3 # $3 / MTok 
      output:
        cost_per_1m: 15 # $15 / MTok 
      extras:
        cache_write_tokens:
          cost_per_1m: 3.75 # $3.75 / MTok 
          billed_separately: true
        cache_read_tokens:
          cost_per_1m: 0.3 # $0.30 / MTok 
      key_aliases:
        prompt_tokens: input_tokens
        completion_tokens: output_tokens
        cache_write: cache_write_tokens
        cache_read: cache_read_tokens
      rounding:
        decimals: 6

  claude-3-5-haiku-latest:
    provider: 'claude'
    display_name: 'Claude 3.5 Haiku'
    description: 'Fast Claude model for lower latency tasks'
    max_tokens: 8192
    temperature: 0.7
    # Pricing (sourced from Claude pricing page)
    # Values are per MTok (cost_per_1m).
    pricing:
      currency: USD
      input:
        cost_per_1m: 0.8 # $0.80 / MTok 
      output:
        cost_per_1m: 4 # $4 / MTok 
      extras:
        cache_write_tokens:
          cost_per_1m: 1 # $1 / MTok 
          billed_separately: true
        cache_read_tokens:
          cost_per_1m: 0.08 # $0.08 / MTok 
      key_aliases:
        prompt_tokens: input_tokens
        completion_tokens: output_tokens
        cache_write: cache_write_tokens
        cache_read: cache_read_tokens
      rounding:
        decimals: 6

  # Ollama Models (local server)
  'gemma3:4b':
    provider: 'ollama'
    display_name: 'Gemma 3 4B (Ollama)'
    description: 'Gemma 3 4B model served via Ollama'
    max_tokens: 4096
    temperature: 0.7

  'gpt-oss:20b':
    provider: 'ollama'
    display_name: 'GPT-OSS 20B (Ollama)'
    description: 'GPT-OSS 20B model served via Ollama'
    max_tokens: 8192
    temperature: 0.7

  # Custom OpenAI Compatible Models
  meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8:
    provider: 'custom_openai_compatible'
    display_name: 'Llama 4 Maverick'
    description: 'Llama 4 Maverick, hosted on Custom OpenAI Compatible'
    max_tokens: 8192
    temperature: 0.7

  # DeepInfra Models (dedicated provider)
  deepseek-ai/DeepSeek-V3.2:
    provider: 'deepinfra'
    display_name: 'DeepSeek V3.2'
    description: 'DeepSeek V3 model, hosted on DeepInfra'
    max_tokens: 8192
    temperature: 0.7
    default_timeout: 300
    # DeepInfra models pass reasoning via model_kwargs.
    reasoning_config:
      model_kwargs:
        reasoning_effort: "medium"

  deepseek-ai/DeepSeek-V3.2:
    provider: 'deepinfra'
    display_name: 'DeepSeek V3 0324'
    description: 'DeepSeek V3 0324, hosted on DeepInfra'
    max_tokens: 8192
    temperature: 0.7

  # Fireworks AI Models (dedicated provider)
  accounts/fireworks/models/kimi-k2p5:
    provider: 'fireworks'
    display_name: 'Kimi K2.5'
    description: 'Kimi K2.5 model, hosted on Fireworks AI'
    max_tokens: 8192
    temperature: 0.7
    # Fireworks reasoning models can preserve reasoning_content across turns.
    # Use either reasoning_effort or thinking, depending on model support.
    # Multimodal image blocks are normalized automatically to image_url payloads.
    multimodal: true
    reasoning_config:
      reasoning_effort: 'medium'
      reasoning_history: 'preserved'

# Tool Providers Registry
# Declaratively register LangChain ToolProvider classes so that
# ``agent_graphs.py`` (the LangGraph Agent Server entry point) can wire them
# without hardcoded ``register_*_provider()`` calls. The dict key MUST match
# the provider's ``name`` attribute; each agent references the key via its
# ``local_tool_providers`` list.
#
# Entry fields:
#   class_path (required) — 'module.path:ClassName'
#   enabled    (optional) — default True; skip registration when False
#   kwargs     (optional) — forwarded to the provider constructor
#
# Example:
tool_providers:
  weather_agent_tools:
    class_path: 'inference_core.agents.tools.weather_provider:WeatherToolsProvider'
  default_agent_tools:
    class_path: 'inference_core.agents.tools.weather_provider:DefaultAgentToolsProvider'
  demo_tool_calling:
    class_path: 'inference_core.agents.tools.demo_tool_calling:DemoToolCallingProvider'
  email_tools:
    class_path: 'inference_core.agents.tools.email_provider:EmailToolsProvider'

# Agent Model Assignments
agents:
  default_agent:
    primary: 'gpt-5-mini'
    # Runtime fallback chain used when a model call fails.
    # User instances may override it with config_overrides.fallback.
    fallback:
      [
        'gemini-2.5-flash',
        'deepseek-ai/DeepSeek-V3.2',
        'claude-3-5-haiku-latest',
      ]
    testing: ['gpt-5-nano']
    description: 'Default agent for general tasks'
    # List of registered tool provider names (see application code for registration)
    local_tool_providers: ['assistant_tools']

    # --- Agent Server (LangGraph) build policy ---
    # execution_mode: 'local' (default) or 'remote' — where the agent runs.
    # server_graph: override whether agent_graphs.py compiles a graph for this
    #   agent. None/omitted = auto (build iff execution_mode == 'remote').
    # use_memory: override whether the server graph includes MemoryMiddleware.
    #   None/omitted = auto-detect from memory_* hints + AGENT_MEMORY_ENABLED.
    # execution_mode: 'remote'
    # server_graph: true
    # use_memory: true

    # Optional: Allowlist of tool names (if omitted, all tools from providers are allowed)
    allowed_tools: ['create_todo_task', 'search_knowledge_base']

    # --- Memory surface configuration ---
    # Controls which memory tools the model can call, whether memory tool
    # instructions are appended to the system prompt, and whether recalled
    # memories are injected as context during the session.
    # All three are optional; omitting them preserves default behaviour.

    # Exact list of memory tool names exposed to the model.
    # Valid: save_memory_store, recall_memories_store, update_memory_store, delete_memory_store
    # Empty list [] disables model-facing tools while keeping after_agent postrun analysis.
    # Omit or set to null to expose all tools (default).
    # memory_tools: ['save_memory_store', 'recall_memories_store']

    # Whether recalled memories are injected into system prompt during model calls.
    # false = skip before_agent recall + wrap_model_call injection, but after_agent
    # postrun analysis still runs independently.
    # Omit or null = inherit from global agent_memory_auto_recall setting.
    # memory_session_context_enabled: true

    # Whether CoALA memory tool usage instructions are appended to the system prompt.
    # false = no instruction block even if memory tools are present.
    # Omit or null = instructions added when memory tools are active.
    # memory_tool_instructions_enabled: true

  # Example: Agent with tool-based model switching
  # This agent uses different models depending on which tool was just called
  reasoning_agent:
    primary: 'gpt-5-mini'
    fallback: ['gemini-2.5-flash']
    description: 'Agent that switches models based on tool usage'
    local_tool_providers: ['assistant_tools']
    # Enable reasoning/thinking output for this agent.
    # The agent's model must have a reasoning_config defined — the config
    # kwargs will be passed to the LangChain model constructor at creation time.
    reasoning_output: true

  # Example: Capability-aware tool routing for a custom multimodal provider
  # Primary model is text-only but the agent still exposes a multimodal tool
  # (e.g. a screenshot tool that declares `requires_multimodal = True`).
  # With `on_missing_capability: delegate`, the tool stays available and its
  # invocation is auto-routed through `multimodal_support_model` via the
  # ToolBasedModelSwitchMiddleware. Use `skip` (default) to simply filter out
  # such tools.
  vision_aware_agent:
    primary: 'deepseek-ai/DeepSeek-V3.2'
    description: 'Text-only agent that can still call custom vision tools via delegation'
    local_tool_providers: ['custom_multimodal_tools']
    on_missing_capability: 'delegate'          # 'skip' (default) or 'delegate'
    multimodal_support_model: 'gpt-5-mini'     # must have multimodal: true
  # Example: Coordinator-style workflows with specialist subagents.
  # Parent coordinators can expose no direct tools at all and delegate the
  # actual I/O to MCP-backed or built-in specialists.
  browser_workflow_coordinator:
    primary: 'gpt-5-mini'
    description: 'Coordinator for browser-heavy workflows that delegates MCP browser work to specialists'
    subagents: ['browser_readonly_worker', 'browser_action_worker']
    reasoning_output: true

  browser_readonly_worker:
    primary: 'gpt-5-mini'
    description: 'Read-only browser subagent backed by the browser-readonly MCP profile'
    mcp_profile: 'browser-readonly'
    reasoning_output: true

  browser_action_worker:
    primary: 'gpt-5-mini'
    description: 'Mutating browser subagent backed by the browser-actions MCP profile'
    mcp_profile: 'browser-actions'
    reasoning_output: true

  email_workflow_coordinator:
    primary: 'gpt-5-mini'
    description: 'Coordinator for inbox triage with optional MCP-backed browser follow-up'
    subagents: ['email_reader_worker', 'browser_readonly_worker']
    reasoning_output: true

  email_reader_worker:
    primary: 'gpt-5-mini'
    description: 'Email subagent backed by the built-in email tools provider'
    local_tool_providers: ['email_tools']
    allowed_tools:
      - list_email_accounts
      - read_unseen_emails
      - search_emails
      - get_email
      - summarize_email
    reasoning_output: true

  research_collection_coordinator:
    primary: 'gpt-5-mini'
    description: 'Coordinator for research workflows that delegates browser and email evidence gathering'
    skills: ['./skills/web-research/']
    subagents: ['browser_readonly_worker', 'email_reader_worker']
    reasoning_output: true

  internal_process_agent:
    primary: 'gpt-5-mini'
    description: 'Agent for internal processes, not exposed to users'
    reasoning_output: true
    user_selectable: false

  # Example: Agent running on remote LangGraph Agent Server
  # Requires AGENT_SERVER_ENABLED=True and AGENT_SERVER_URL in .env
  # remote_agent:
  #   primary: 'gpt-5-mini'
  #   description: 'Agent delegated to LangGraph Agent Server'
  #   execution_mode: 'remote'             # 'local' (default) or 'remote'
  #   remote_graph_id: 'my_graph'          # Graph ID on Agent Server (defaults to agent name)
  #   local_tool_providers: []             # Tools are loaded on the server side

  # Example: Agent returning a validated structured response alongside messages.
  # response_format is a JSON Schema dict forwarded to LangChain's create_agent.
  # The captured object is exposed via AgentResponse.structured_response.
  # Strategy (provider-native vs tool-calling) is auto-selected per model.
  # structured_extractor:
  #   primary: 'gpt-5-mini'
  #   description: 'Extracts contact info as structured JSON'
  #   response_format:
  #     type: object
  #     description: 'Contact information for a person'
  #     properties:
  #       name: { type: string, description: 'Full name' }
  #       email: { type: string, description: 'Email address' }
  #       phone: { type: string, description: 'Phone number' }
  #     required: ['name', 'email']

  # Example: Weather agent that returns structured forecast data.
  # Pairs with WeatherToolsProvider (weather_agent_tools) and check_weather tool.
  # The raw OpenWeatherMap payload is normalised by the model into the schema below.
  # weather_agent:
  #   primary: 'gpt-5-mini'
  #   description: 'Agent specialized in providing weather information'
  #   execution_mode: 'remote'
  #   allowed_tools: ['check_weather']
  #   local_tool_providers: ['weather_agent_tools']
  #   response_format:
  #     type: object
  #     description: Weather forecast for a requested location
  #     properties:
  #       city:
  #         type: string
  #         description: Resolved city name
  #       country:
  #         type: string
  #         description: Country name
  #       current_temperature_c:
  #         type: number
  #         description: Current temperature in Celsius
  #       feels_like_c:
  #         type: number
  #         description: Feels-like temperature in Celsius
  #       humidity_percent:
  #         type: integer
  #         description: Current relative humidity (0–100)
  #       weather_description:
  #         type: string
  #         description: Short human-readable weather description (e.g. "light rain")
  #       wind_speed_ms:
  #         type: number
  #         description: Wind speed in metres per second
  #       forecast:
  #         type: array
  #         description: Next forecast periods (up to 5 entries)
  #         items:
  #           type: object
  #           properties:
  #             datetime:
  #               type: string
  #               description: ISO 8601 forecast timestamp
  #             temperature_c:
  #               type: number
  #             weather_description:
  #               type: string
  #           required: [datetime, temperature_c, weather_description]
  #     required:
  #       - city
  #       - country
  #       - current_temperature_c
  #       - weather_description

# =============================================================================
# EMBEDDING PROVIDERS (only used when EMBEDDING_BACKEND=remote)
# =============================================================================
# When EMBEDDING_BACKEND=remote, the system uses LangChain embedding classes
# to call external API providers instead of a local SentenceTransformer model.
# Each named entry defines a remote embedding configuration. The 'default' entry
# is used unless overridden.
embeddings:
  default:
    provider: openai                 # openai | gemini | deepinfra | fireworks | ollama
    model: text-embedding-3-small    # Provider-specific model name
    # dimensions: 1536              # Optional dimension override (OpenAI v3 supports this)
    # api_key_env: OPENAI_API_KEY   # Defaults to provider's api_key_env
    # base_url:                     # Override for custom endpoints

  # large:
  #   provider: openai
  #   model: text-embedding-3-large
  #   dimensions: 3072

  # gemini:
  #   provider: gemini
  #   model: models/text-embedding-004

  # deepinfra:
  #   provider: deepinfra
  #   model: sentence-transformers/all-MiniLM-L6-v2
  #   api_key_env: DEEPINFRA_API_TOKEN

  # local_ollama:
  #   provider: ollama
  #   model: nomic-embed-text
  #   base_url: http://localhost:11434

mcp:
  enabled: true # ENABLE MCP (disabled by default)
  require_superuser: false
  default_profile: 'web-browsing'

  profiles:
    web-browsing:
      description: 'General web browsing and interaction via Playwright'
      servers: ['playwright']
      include_tools: [
          'browser_navigate',
          'browser_navigate_back',
          'browser_click',
        ] # Optional tool allowlist

    browser-readonly:
      description: 'Read-only browser worker profile for navigation-only flows'
      servers: ['playwright']
      include_tools: ['browser_navigate', 'browser_navigate_back']

    browser-actions:
      description: 'Mutating browser worker profile for guarded click-based flows'
      servers: ['playwright']
      include_tools: ['browser_navigate', 'browser_navigate_back', 'browser_click']

  servers:
    playwright:
      transport: 'streamable_http'
      url: 'http://localhost:8931/mcp'
      headers:
        Authorization: '${MCP_PLAYWRIGHT_TOKEN:-}' # Env var expansion
      timeouts:
        connect_seconds: 10
        read_seconds: 300
      terminate_on_close: true

# General Settings
settings:
  enable_caching: true
  cache_ttl_seconds: 3600
  max_concurrent_requests: 5
  enable_monitoring: true
  default_timeout: 60
  retry_attempts: 3
  retry_delay: 1.0

  # Rate limiting
  rate_limit_requests_per_minute: 60
  rate_limit_tokens_per_minute: 90000

  # Safety settings
  max_prompt_length: 64000
  max_response_length: 4096
  content_filter_enabled: true

  # Testing settings
  testing:
    enable_integration_tests: true
    test_timeout: 30
    mock_responses_by_default: true
    skip_slow_models: true

# Parameter policy overrides (optional)
# Allows introducing NEW parameters without code changes.
# Semantics:
#  - providers.<provider>.patch|replace
#  - models.<model>.patch|replace (provider inferred unless specified)
#  - settings.passthrough_prefixes: any param starting with these prefixes is forwarded
param_policies:
  settings:
    passthrough_prefixes: ['x_', 'ext_']
  providers:
    openai:
      patch:
        allowed: ['logit_bias', 'response_format']
    claude:
      patch:
        allowed: ['metadata', 'system']
  models:
    gpt-5:
      replace:
        allowed: ['reasoning_effort', 'verbosity']
        dropped:
          [
            'temperature',
            'top_p',
            'frequency_penalty',
            'presence_penalty',
            'max_tokens',
            'request_timeout',
          ]
    gpt-5-mini:
      replace:
        allowed: ['reasoning_effort', 'verbosity']
        dropped:
          [
            'temperature',
            'top_p',
            'frequency_penalty',
            'presence_penalty',
            'max_tokens',
            'request_timeout',
          ]
    gpt-5-nano:
      replace:
        allowed: ['reasoning_effort', 'verbosity']
        dropped:
          [
            'temperature',
            'top_p',
            'frequency_penalty',
            'presence_penalty',
            'max_tokens',
            'request_timeout',
          ]

# Batch Processing Configuration
batch:
  enabled: true
  default_poll_interval_seconds: 30
  max_concurrent_provider_polls: 5
  defaults:
    retry:
      max_attempts: 5
      base_delay: 2
      max_delay: 60
  providers:
    openai:
      enabled: true
      models:
        - name: gpt-5-mini
          mode: chat
          max_prompts_per_batch: 20
          pricing_tier: batch
    gemini:
      enabled: true
      models:
        - name: gemini-2.5-flash
          mode: chat
          max_prompts_per_batch: 100
    claude:
      enabled: true
      models:
        - name: claude-3-5-haiku-latest
          mode: chat
          max_prompts_per_batch: 100
